<VirtualHost *:80>
    # Nazwa serwera - może to być adres IP lub nazwa (np. "serwer-lan")
    ServerName 192.168.50.117

    # --- Konfiguracja strony statycznej (główny katalog) ---
    DocumentRoot /home/konrad/public_html

        # Obsługa błędów
    ErrorDocument 404 /404.html
    # Opcjonalnie inne kody:
    # ErrorDocument 403 /403.html
    # ErrorDocument 500 /500.html
    
    <Directory /home/konrad/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- Reverse Proxy dla Aplikacji 1 (app1) ---
    # Kiedy ktoś wejdzie na adres /app1, Apache przekaże to na port 5001
    ProxyPass /app1 http://127.0.0.1:5001/
    ProxyPassReverse /app1 http://127.0.0.1:5001/

    # Ustaw specjalny nagłówek, aby Flask wiedział, że działa w subkatalogu
    <Location /app1>
        Require all granted
        RequestHeader set X-Forwarded-Prefix /app1
    </Location>

    # --- Reverse Proxy dla Aplikacji 2 (app2) ---
    ProxyPass /app2 http://127.0.0.1:5002/
    ProxyPassReverse /app2 http://127.0.0.1:5002/
    <Location /app2>
        Require all granted
        RequestHeader set X-Forwarded-Prefix /app2
    </Location>

 # --- Reverse Proxy dla Aplikacji 3 (app3) ---
    ProxyPass /app3 http://127.0.0.1:5003/
    ProxyPassReverse /app3 http://127.0.0.1:5003/
    <Location /app3>
        Require all granted
        RequestHeader set X-Forwarded-Prefix /app3
    </Location>


 # --- Reverse Proxy dla Aplikacji 4 (app4) ---
