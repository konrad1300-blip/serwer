    ProxyPassReverse /app5 http://127.0.0.1:5005/
    <Location /app5>
        Require all granted
        RequestHeader set X-Forwarded-Prefix /app5
    </Location>

 # --- Reverse Proxy dla Aplikacji 6 (app6) ---
    ProxyPass /app6 http://127.0.0.1:5006/
    ProxyPassReverse /app6 http://127.0.0.1:5006/
    <Location /app6>
