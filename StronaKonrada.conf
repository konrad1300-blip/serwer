    ProxyPassReverse /app4 http://127.0.0.1:5004/
    <Location /app4>
        Require all granted
        RequestHeader set X-Forwarded-Prefix /app4
    </Location>


 # --- Reverse Proxy dla Aplikacji 5 (app5) ---
