<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Dynamiczne ustawienie base URL
        (function() {
            var path = window.location.pathname;
            if (path !== '/' && path !== '') {
                var parts = path.split('/');
                if (parts.length > 1 && parts[1] !== 'qc') {
                    var base = '/' + parts[1] + '/';
                    var baseElement = document.createElement('base');
                    baseElement.href = base;
                    document.head.appendChild(baseElement);
                }
            }
        })();
    </script>
    <title>QC Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <a href="/">Strona główna</a>
        <a href="{{ url_for('qc.form') }}">Kalkulator QC</a>
        <a href="{{ url_for('qc.history') }}">Historia</a>
        <a href="{{ url_for('qc.statistics') }}">Statystyki</a>
        <a href="{{ url_for('qc.edit_config') }}">Konfiguracja</a>
    </nav>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/qc.js') }}"></script>
</body>
</html>
