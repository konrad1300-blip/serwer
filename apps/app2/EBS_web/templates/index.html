<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator szerokości tekstu</title>
<style>
    body {
    margin: 0;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;      /* elementy układają się w kolumnie */
    align-items: center;         /* wyśrodkowanie w poziomie */
    justify-content: flex-start; /* wyrównanie do góry */
}

nav {
    background-color: #4a4a4a;
    padding: 12px 20px;
    border-radius: 50px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    margin-bottom: 20px;
    width: 100%;
    max-width: 700px;  /* taka sama szerokość jak .container */
    box-sizing: border-box;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: 500;
    transition: color 0.3s;
}

nav a:hover {
    color: #ddd;
}
.container {
    background-color: rgba(255, 255, 255, 0.9);
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
max-width: 700px;  /* taka sama szerokość jak .container */
    width: 100%;
    margin: 20px;
}
h1 {
    color: #333;
    font-size: 2.2em;
    margin-bottom: 20px;
    text-align: center;
}
.form-group {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}
.form-group label {
    color: #555;
    font-weight: 600;
    margin-bottom: 5px;
}
.form-group input,
.form-group select {
    padding: 10px 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 1em;
    background-color: white;
    transition: border 0.3s;
}
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #4a4a4a;
    box-shadow: 0 0 5px rgba(74,74,74,0.3);
}
.checkbox-group {
    display: flex;
    gap: 20px;
    margin: 15px 0;
}
.checkbox-item {
    display: flex;
    align-items: center;
}
.checkbox-item input {
    margin-right: 8px;
    width: 18px;
    height: 18px;
}
.btn {
    display: inline-block;
    background-color: #4a4a4a;
    color: white;
    padding: 12px 30px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1em;
    transition: background-color 0.3s, transform 0.2s;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    width: 100%;
    margin-top: 10px;
}
.btn:hover {
    background-color: #2c3e50;
    transform: scale(1.02);
    box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
}
.results {
    margin-top: 25px;
    background-color: rgba(255,255,255,0.8);
    border-radius: 15px;
    padding: 15px 20px;
    color: #333;
    border: 1px solid #ddd;
}
.result-row {
    display: flex;
    justify-content: space-between;
    font-size: 1.2em;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}
.result-row:last-child {
    border-bottom: none;
}
.error {
    color: #d32f2f;
    text-align: center;
    margin-top: 15px;
    font-weight: 500;
}
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9em;
    color: #777;
}
hr {
    border: 0;
    height: 2px;
    background-color: #333;
    border-radius: 2px;
}
/* Przycisk w nawigacji - taki sam jak .btn */
nav .nav-btn {
    background-color: #4a4a4a;
    color: white;
    padding: 12px 30px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1em;
    transition: background-color 0.3s, transform 0.2s;
    display: inline-block;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

nav .nav-btn:hover {
    background-color: #2c3e50;
    transform: scale(1.02);
    box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
}
/* Responsywność */
@media (max-width: 600px) {
    .container {
        padding: 20px;
    }
    .checkbox-group {
        flex-direction: column;
        gap: 10px;
    }
}
</style>



<script>
    // Czekamy, aż cała strona się załaduje
    document.addEventListener('DOMContentLoaded', function() {
        // Znajdujemy nasz formularz i pole tekstowe
        const form = document.querySelector('form');
        const textInput = document.getElementById('text');

        // Dodajemy nasłuchiwanie na zdarzenie 'invalid' (nieprawidłowe dane)
        textInput.addEventListener('invalid', function(event) {
            // Sprawdzamy, czy pole jest puste
            if (this.validity.valueMissing) {
                // Blokujemy domyślny angielski komunikat
                event.preventDefault();
                // Ustawiamy nasz własny komunikat po polsku
                this.setCustomValidity('Proszę wpisać tekst.');
                // Wyświetlamy komunikat
                this.reportValidity();
            }
        });

        // Gdy użytkownik zacznie pisać, kasujemy nasz niestandardowy komunikat,
        // aby nie pojawiał się niepotrzebnie.
        textInput.addEventListener('input', function() {
            this.setCustomValidity('');
        });
    });
</script>

</head>
<body>
    <nav>
        <a href="/" class="nav-btn">Strona główna</a>
    </nav>
    <div class="container">
        <h1>Kalkulator szerokości tekstu (w mm)</h1>
        <br><hr>
        <p>Kalkulator podaje w milimetrach długość napisu wykonanego drukarką EBS przy wysokości czcionki 50 mm</p>
        <br><hr><br>
        
        <form method="post">
            <div class="form-group">
                <label for="text">Wpisz tekst:</label>
                <input type="text" id="text" name="text">
            </div>
            <button type="submit" class="btn">Oblicz</button>
        </form>

        {% if result %}
            <div class="results">
                <div class="result-row">
                    <strong>Wynik:</strong> <span>{{ result }}</span>
                </div>
            </div>
        {% endif %}
    </div>
</body>
</html>
