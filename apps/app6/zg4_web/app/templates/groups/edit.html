{% extends "base.html" %}

{% block content %}
<h1>Edytuj grupę</h1>

<form method="post">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.nazwa.label(class="form-label") }}
        {{ form.nazwa(class="form-control") }}
        {% if form.nazwa.errors %}
            <div class="text-danger">{{ form.nazwa.errors[0] }}</div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-success">Zapisz</button>
    <a href="{{ url_for('groups.list') }}" class="btn btn-secondary">Anuluj</a>
</form>
{% endblock %}
